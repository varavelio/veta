name: Release

on:
  release:
    types: [published]

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
      clean_tag: ${{ steps.vars.outputs.clean_tag }}
    steps:
      - id: vars
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: |
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "clean_tag=${TAG#v}" >> "$GITHUB_OUTPUT"

  build-and-upload:
    name: Build and upload release assets
    runs-on: ubuntu-latest
    needs: setup
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Run release script
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: >-
            /bin/bash -lc
            "VETA_VERSION='${{ needs.setup.outputs.clean_tag }}'
            VETA_COMMIT=\"$(git rev-parse --short HEAD)\"
            VETA_DATE='${{ github.event.release.published_at }}'
            task release"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./dist/*.tar.gz
            ./dist/*.zip
            ./dist/checksums.txt
            ./dist/manifest.json

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [setup, build-and-upload]
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 10
    env:
      TAG: ${{ needs.setup.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Download release manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG" --pattern manifest.json --dir ./integrations/installers/npm --clobber

      - name: Publish to npm
        run: |
          cd ./integrations/installers/npm

          echo "Publishing version: $TAG"
          npm version "$TAG" --no-git-tag-version --allow-same-version

          if [[ "$TAG" == *"-"* ]]; then
            NPM_TAG="next"
          else
            NPM_TAG="latest"
          fi
          echo "Using npm tag: $NPM_TAG"

          npm publish --provenance --access public --tag "$NPM_TAG"

  publish-homebrew:
    name: Publish to Homebrew Tap
    runs-on: ubuntu-latest
    needs: [setup, build-and-upload]
    permissions:
      contents: read
    timeout-minutes: 10
    env:
      CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}
      TAG: ${{ needs.setup.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: varavelio/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Create mount directories
        run: |
          mkdir -p ~/.claude ~/.config/opencode ~/.local/share/opencode

      - name: Generate Homebrew formulas
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: >-
            /bin/bash -lc
            "go run ./integrations/installers/brew
            '${{ needs.setup.outputs.clean_tag }}'
            ./homebrew-tap"

      - name: Update Homebrew Tap
        run: |
          git -C homebrew-tap config user.name "Varavel Release Bot"
          git -C homebrew-tap config user.email "release-bot@varavel.com"
          git -C homebrew-tap add Formula
          if git -C homebrew-tap diff --cached --quiet; then
            echo "No changes detected in Formula directory"
            exit 0
          fi
          git -C homebrew-tap commit -m "chore: update veta to $TAG"
          git -C homebrew-tap push

  build-and-push-images:
    name: Build and push ${{ matrix.vars.platform }}
    runs-on: ${{ matrix.vars.os }}
    needs: [setup, build-and-upload]
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    strategy:
      matrix:
        vars:
          - { os: ubuntu-24.04, platform: amd64 }
          - { os: ubuntu-24.04-arm, platform: arm64 }
    env:
      CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}
      PLATFORM: ${{ matrix.vars.platform }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build the Docker image
        run: >
          docker build
          --tag varavel/veta:${CLEAN_TAG}-${PLATFORM}
          --tag ghcr.io/varavelio/veta:${CLEAN_TAG}-${PLATFORM}
          --build-arg TARGETARCH=${PLATFORM}
          --build-arg VETA_VERSION=${CLEAN_TAG}
          --file ./integrations/installers/docker/Dockerfile .

      - name: Push the Docker images
        run: |
          docker push varavel/veta:${CLEAN_TAG}-${PLATFORM}
          docker push ghcr.io/varavelio/veta:${CLEAN_TAG}-${PLATFORM}

  merge-and-push-manifest:
    name: Merge and push manifest
    runs-on: ubuntu-latest
    needs: [setup, build-and-push-images]
    permissions:
      contents: read
      packages: write
    timeout-minutes: 10
    env:
      CLEAN_TAG: ${{ needs.setup.outputs.clean_tag }}
      TAG: ${{ needs.setup.outputs.tag }}

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge and push manifests
        run: |
          docker manifest create varavel/veta:${CLEAN_TAG} \
            --amend varavel/veta:${CLEAN_TAG}-amd64 \
            --amend varavel/veta:${CLEAN_TAG}-arm64
          docker manifest push varavel/veta:${CLEAN_TAG}

          docker manifest create ghcr.io/varavelio/veta:${CLEAN_TAG} \
            --amend ghcr.io/varavelio/veta:${CLEAN_TAG}-amd64 \
            --amend ghcr.io/varavelio/veta:${CLEAN_TAG}-arm64
          docker manifest push ghcr.io/varavelio/veta:${CLEAN_TAG}

          if [[ "$TAG" != *"-"* ]]; then
            docker manifest create varavel/veta:latest \
              --amend varavel/veta:${CLEAN_TAG}-amd64 \
              --amend varavel/veta:${CLEAN_TAG}-arm64
            docker manifest push varavel/veta:latest

            docker manifest create ghcr.io/varavelio/veta:latest \
              --amend ghcr.io/varavelio/veta:${CLEAN_TAG}-amd64 \
              --amend ghcr.io/varavelio/veta:${CLEAN_TAG}-arm64
            docker manifest push ghcr.io/varavelio/veta:latest
          fi
